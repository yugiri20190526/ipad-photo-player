<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PhotoPlayer">
<meta name="build" content="photo-player-20260709-001409">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PhotoPlayer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #252525;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0; --text2: #888;
    --accent: #4a9eff; --accent2: #1a6fd4;
    --radius: 10px; --radius-sm: 6px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; height: -webkit-fill-available; height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden; -webkit-user-select: none; user-select: none;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
  }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); background: transparent;
    color: var(--text); font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .btn:active { background: var(--bg3); }
  .btn-accent { background: var(--accent); border-color: transparent; color: #fff; }
  .btn-accent:active { background: var(--accent2); }
  .btn-danger { border-color: #ff4a4a44; color: #ff6b6b; }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* グリッド表示 */
  .gallery-grid {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px; align-content: start;
  }
  .gallery-item {
    aspect-ratio: 1; position: relative; cursor: pointer;
    border-radius: 8px; overflow: hidden;
    background: var(--bg3); -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .gallery-item:active { transform: scale(0.95); }
  .gallery-item img, .gallery-item video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .gallery-item .duration {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
  }
  .gallery-item .play-badge {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
  }

  .empty-gallery {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text2); text-align: center;
  }
  .empty-gallery svg { margin-bottom: 12px; opacity: 0.3; }
  .empty-gallery p { font-size: 14px; line-height: 1.6; }

  /* 詳細ビュー */
  .detail-view {
    position: fixed; inset: 0; z-index: 100;
    background: #000; display: none;
    flex-direction: column; overflow: hidden;
  }
  .detail-view.show { display: flex; }

  .detail-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; background: rgba(0,0,0,0.5);
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
  }
  .detail-counter { font-size: 13px; color: var(--text2); }
  .detail-close { background: none; border: none; color: #fff;
    font-size: 24px; cursor: pointer; padding: 0; width: 32px; height: 32px;
  }

  .detail-content {
    flex: 1; display: flex; overflow: hidden;
    position: relative;
  }
  .detail-media {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-media img, .detail-media video {
    max-width: 100%; max-height: 100%;
    display: block;
  }

  .detail-controls {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px; background: rgba(0,0,0,0.5);
    border-top: 0.5px solid rgba(255,255,255,0.1);
  }
  .detail-btn {
    background: none; border: none; color: #fff;
    font-size: 28px; cursor: pointer; padding: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .detail-center-controls {
    display: flex; gap: 16px; align-items: center;
  }

  .gallery-grid::-webkit-scrollbar { width: 4px; }
  .gallery-grid::-webkit-scrollbar-track { background: transparent; }
  .gallery-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 0.5px solid var(--border2);
    color: var(--text); padding: 10px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .progress-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center;
  }
  .progress-overlay.show { display: flex; }
  .progress-box {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 16px; padding: 24px 28px; width: 78%; max-width: 320px;
    text-align: center;
  }
  .progress-label {
    font-size: 13px; color: var(--text2); margin-bottom: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .progress-track { height: 8px; background: var(--border2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: width 0.2s ease; }
  .progress-pct { margin-top: 12px; font-size: 24px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }

  #fileInput { display: none; }

  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🖼 PhotoPlayer</h1>
  <div class="header-actions">
    <button class="btn btn-accent" id="addBtn" onclick="document.getElementById('fileInput').click();">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      追加
    </button>
    <button class="btn btn-danger" id="clearBtn">全削除</button>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime,video/x-m4v,video/webm" multiple>
  </div>
</div>

<div class="main">
  <div class="gallery-grid" id="galleryGrid">
    <div class="empty-gallery" id="emptyGallery">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>写真・動画を追加してください<br>複数選択に対応しています</p>
    </div>
  </div>
</div>

<!-- 詳細ビュー -->
<div class="detail-view" id="detailView">
  <div class="detail-header">
    <span class="detail-counter" id="detailCounter"></span>
    <button class="detail-close" id="detailClose">✕</button>
  </div>
  <div class="detail-content">
    <div class="detail-media" id="detailMedia"></div>
  </div>
  <div class="detail-controls">
    <button class="detail-btn" id="detailPrevBtn">‹</button>
    <div class="detail-center-controls">
      <button class="detail-btn" id="detailPlayBtn" style="font-size:32px">▶</button>
      <button class="detail-btn" id="detailSlideBtn" title="スライドショー">▶▶</button>
    </div>
    <button class="detail-btn" id="detailNextBtn">›</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-label" id="progressLabel">追加中…</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>
</div>

<div id="ver" style="position:fixed;bottom:4px;right:8px;font-size:12px;color:#888;z-index:999;pointer-events:none;font-family:monospace;"></div>

<script>
// グローバル変数
const DB_NAME = 'photoPlayerDB1', STORE = 'media', DB_VER = 1;
const THUMB_VER = 1;
const THUMB_W = 200, THUMB_H = 200;
const THUMB_Q = 0.85;

let db, media = [], currentDetailIdx = -1;
let isSlideShowRunning = false, slideShowTimer = null;

// DOM要素をグローバルに保存（後で使用）
let addBtn, fileInput, clearBtn, detailClose, detailPrevBtn, detailNextBtn, detailPlayBtn, detailSlideBtn, detailView;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej('DB error');
  });
}

function getAllMedia() {
  return new Promise(res => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => {
      const list = req.result || [];
      list.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
      res(list);
    };
  });
}

function generateThumb(file) {
  return new Promise(res => {
    const type = file.type;
    const isImage = type.startsWith('image/');
    const isVideo = type.startsWith('video/');

    if (isImage) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = THUMB_W; c.height = THUMB_H;
          const ctx = c.getContext('2d');
          ctx.imageSmoothingQuality = 'high';
          const iw = img.width, ih = img.height;
          const targetAR = THUMB_W / THUMB_H, srcAR = iw / ih;
          let sw, sh, sx, sy;
          if (srcAR > targetAR) { sh = ih; sw = ih * targetAR; sx = (iw - sw) / 2; sy = 0; }
          else { sw = iw; sh = iw / targetAR; sx = 0; sy = (ih - sh) / 2; }
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, THUMB_W, THUMB_H);
          res(c.toDataURL('image/jpeg', THUMB_Q));
        };
        img.onerror = () => res(null);
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    } else if (isVideo) {
      const v = document.createElement('video');
      v.muted = true; v.defaultMuted = true; v.playsInline = true;
      v.setAttribute('muted', ''); v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
      v.preload = 'auto';
      v.style.cssText = 'position:fixed;left:-9999px;top:0;width:120px;height:68px;opacity:0.01;pointer-events:none;';
      document.body.appendChild(v);

      const url = URL.createObjectURL(file);
      v.src = url;

      let settled = false;
      const timer = setTimeout(() => { if (!settled && v.videoWidth) draw(); else finish(null); }, 12000);

      function finish(result) {
        if (settled) return; settled = true; clearTimeout(timer);
        try { v.pause(); } catch (e) {}
        URL.revokeObjectURL(url);
        v.removeAttribute('src');
        try { v.load(); } catch (e) {}
        if (v.parentNode) v.parentNode.removeChild(v);
        res(result);
      }

      function draw() {
        try {
          const c = document.createElement('canvas');
          c.width = THUMB_W; c.height = THUMB_H;
          const ctx = c.getContext('2d');
          ctx.imageSmoothingQuality = 'high';
          const vw = v.videoWidth, vh = v.videoHeight;
          if (vw && vh) {
            const targetAR = THUMB_W / THUMB_H, srcAR = vw / vh;
            let sw, sh, sx, sy;
            if (srcAR > targetAR) { sh = vh; sw = vh * targetAR; sx = (vw - sw) / 2; sy = 0; }
            else { sw = vw; sh = vw / targetAR; sx = 0; sy = (vh - sh) / 2; }
            ctx.drawImage(v, sx, sy, sw, sh, 0, 0, THUMB_W, THUMB_H);
          } else {
            ctx.drawImage(v, 0, 0, THUMB_W, THUMB_H);
          }
          finish(c.toDataURL('image/jpeg', THUMB_Q));
        } catch (e) { finish(null); }
      }

      v.addEventListener('loadeddata', async () => {
        const d = v.duration;
        const target = (isFinite(d) && d > 0) ? Math.min(3, d * 0.1) : 0.1;
        try { await v.play(); } catch (e) {}
        let grabbed = false;
        const grab = () => {
          if (grabbed) return; grabbed = true;
          try { v.pause(); } catch (e) {}
          requestAnimationFrame(() => requestAnimationFrame(draw));
        };
        v.addEventListener('seeked', grab, { once: true });
        v.addEventListener('timeupdate', () => { if (v.currentTime > 0.05) grab(); }, { once: true });
        try { v.currentTime = target; } catch (e) { grab(); }
      });

      v.addEventListener('error', () => finish(null));
    } else {
      res(null);
    }
  });
}

function addMediaOnce(name, blob, thumb, type, duration) {
  return new Promise((resolve, reject) => {
    let tx, req;
    try {
      tx = db.transaction(STORE, 'readwrite');
      req = tx.objectStore(STORE).add({ name, blob, thumb, thumbVer: THUMB_VER, type, duration, addedAt: Date.now() });
    } catch (e) { return reject(e); }
    req.onsuccess = () => resolve(req.result);
    req.onerror = (ev) => { if (ev && ev.preventDefault) ev.preventDefault(); reject(req.error || new Error('add failed')); };
    tx.onabort = () => reject(tx.error || new Error('transaction aborted'));
  });
}

async function addMedia(file) {
  const thumb = await generateThumb(file);
  const type = file.type.startsWith('video/') ? 'video' : 'image';
  let duration = null;
  if (type === 'video') {
    const v = document.createElement('video');
    v.src = URL.createObjectURL(file);
    duration = await new Promise(res => {
      v.addEventListener('loadedmetadata', () => res(v.duration));
      v.addEventListener('error', () => res(null));
    });
  }
  for (let attempt = 0; attempt < 5; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, 300 * attempt));
    try { return await addMediaOnce(file.name, file, thumb, type, duration); }
    catch (e) { }
  }
  return null;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function updateGallery() {
  const grid = document.getElementById('galleryGrid');
  const empty = document.getElementById('emptyGallery');

  if (media.length === 0) {
    grid.innerHTML = '';
    grid.appendChild(empty.parentNode.replaceChild(empty.cloneNode(true), empty));
    return;
  }

  grid.innerHTML = '';
  media.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    const thumb = item.thumb || (item.type === 'image' ? '📷' : '🎬');
    let html = '';
    if (typeof thumb === 'string' && thumb.startsWith('data:')) {
      html = `<img src="${thumb}" alt="">`;
    } else if (item.type === 'video') {
      html = `<video style="width:100%;height:100%;object-fit:cover;"><source src="blob:"></video><div class="play-badge">▶</div>`;
      if (item.duration) html += `<div class="duration">${formatTime(item.duration)}</div>`;
    } else {
      html = `<img src="${thumb}" alt="">`;
    }
    div.innerHTML = html;
    div.addEventListener('click', () => showDetail(idx));
    grid.appendChild(div);
  });
}

function formatTime(seconds) {
  if (!seconds) return '';
  const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function showDetail(idx) {
  currentDetailIdx = idx;
  const detail = document.getElementById('detailView');
  detail.classList.add('show');
  renderDetailMedia();
  updateDetailCounter();
}

function renderDetailMedia() {
  const item = media[currentDetailIdx];
  const media_el = document.getElementById('detailMedia');
  media_el.innerHTML = '';

  if (!item) return;

  const url = URL.createObjectURL(item.blob);
  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = url;
    media_el.appendChild(img);
  } else if (item.type === 'video') {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.playsinline = true;
    video.setAttribute('webkit-playsinline', '');
    media_el.appendChild(video);
  }
}

function updateDetailCounter() {
  const counter = document.getElementById('detailCounter');
  counter.textContent = `${currentDetailIdx + 1} / ${media.length}`;
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('show');
  stopSlideShow();
}

function goDetailPrev() {
  currentDetailIdx = (currentDetailIdx - 1 + media.length) % media.length;
  renderDetailMedia();
  updateDetailCounter();
}

function goDetailNext() {
  currentDetailIdx = (currentDetailIdx + 1) % media.length;
  renderDetailMedia();
  updateDetailCounter();
}

function startSlideShow() {
  if (isSlideShowRunning) return;
  isSlideShowRunning = true;
  const interval = 3000; // 3秒
  slideShowTimer = setInterval(() => {
    goDetailNext();
  }, interval);
  document.getElementById('detailSlideBtn').textContent = '⏸';
}

function stopSlideShow() {
  if (!isSlideShowRunning) return;
  isSlideShowRunning = false;
  if (slideShowTimer) clearInterval(slideShowTimer);
  document.getElementById('detailSlideBtn').textContent = '▶▶';
}

function toggleSlideShow() {
  if (isSlideShowRunning) stopSlideShow();
  else startSlideShow();
}

async function handleFileSelect(files) {
  const overlay = document.getElementById('progressOverlay');
  overlay.classList.add('show');
  const label = document.getElementById('progressLabel');
  const fill = document.getElementById('progressFill');
  const pct = document.getElementById('progressPct');

  let added = 0;
  for (let i = 0; i < files.length; i++) {
    label.textContent = files[i].name;
    fill.style.width = ((i / files.length) * 100) + '%';
    pct.textContent = Math.floor((i / files.length) * 100) + '%';

    const id = await addMedia(files[i]);
    if (id) added++;
  }

  fill.style.width = '100%';
  pct.textContent = '100%';

  setTimeout(() => {
    overlay.classList.remove('show');
    media = await getAllMedia();
    updateGallery();
    if (added > 0) showToast(`${added}件追加しました`);
  }, 500);
}

// イベントリスナー登録関数
function setupEventListeners() {
  addBtn = document.getElementById('addBtn');
  fileInput = document.getElementById('fileInput');
  clearBtn = document.getElementById('clearBtn');
  detailClose = document.getElementById('detailClose');
  detailPrevBtn = document.getElementById('detailPrevBtn');
  detailNextBtn = document.getElementById('detailNextBtn');
  detailPlayBtn = document.getElementById('detailPlayBtn');
  detailSlideBtn = document.getElementById('detailSlideBtn');
  detailView = document.getElementById('detailView');

  if (addBtn) {
    addBtn.addEventListener('click', () => {
      console.log('Add button clicked');
      if (fileInput) {
        console.log('Clicking file input');
        fileInput.click();
      } else {
        console.log('File input not found');
      }
    });
  }

  if (fileInput) {
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files);
        e.target.value = '';
      }
    });
  }

  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (!confirm('すべて削除しますか？')) return;
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).clear();
      tx.oncomplete = () => {
        media = [];
        updateGallery();
        showToast('すべて削除しました');
      };
    });
  }

  if (detailClose) detailClose.addEventListener('click', closeDetail);
  if (detailPrevBtn) detailPrevBtn.addEventListener('click', goDetailPrev);
  if (detailNextBtn) detailNextBtn.addEventListener('click', goDetailNext);

  if (detailPlayBtn) {
    detailPlayBtn.addEventListener('click', () => {
      const video = document.querySelector('#detailMedia video');
      if (video) {
        if (video.paused) video.play();
        else video.pause();
      }
    });
  }

  if (detailSlideBtn) detailSlideBtn.addEventListener('click', toggleSlideShow);

  if (detailView) {
    detailView.addEventListener('click', (e) => {
      if (e.target.id === 'detailView') closeDetail();
    });
  }
}

// 初期化関数
function initApp() {
  // ビルドIDを表示
  const b = document.querySelector('meta[name="build"]');
  const verEl = document.getElementById('ver');
  if (verEl) {
    verEl.textContent = (b && b.content) ? b.content : '不明';
  }

  setupEventListeners();
  openDB().then(() => {
    getAllMedia().then(list => {
      media = list;
      updateGallery();
    });
  });
}

// DOMContentLoadedまたは既にロード完了していれば実行
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}

// ビルドIDを表示（body直前で同期的に実行）
setTimeout(() => {
  const b = document.querySelector('meta[name="build"]');
  const verEl = document.getElementById('ver');
  if (verEl && b && b.content) {
    verEl.textContent = b.content;
  }
}, 100);
</script>
</body>
</html>
