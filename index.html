<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PhotoPlayer">
<meta name="build" content="photo-player-20260709-003727">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PhotoPlayer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #252525;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0; --text2: #888;
    --accent: #4a9eff; --accent2: #1a6fd4;
    --radius: 10px; --radius-sm: 6px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; height: -webkit-fill-available; height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden; -webkit-user-select: none; user-select: none;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
  }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); background: transparent;
    color: var(--text); font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .btn:active { background: var(--bg3); }
  .btn-accent { background: var(--accent); border-color: transparent; color: #fff; }
  .btn-accent:active { background: var(--accent2); }
  .btn-danger { border-color: #ff4a4a44; color: #ff6b6b; }
  .main { display: flex; flex: 1; overflow: hidden; }

  .gallery-grid {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px; align-content: start;
  }
  .gallery-item {
    aspect-ratio: 1; position: relative; cursor: pointer;
    border-radius: 8px; overflow: hidden;
    background: var(--bg3); -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .gallery-item:active { transform: scale(0.95); }
  .gallery-item img, .gallery-item video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .gallery-item .duration {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
  }
  .gallery-item .play-badge {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
  }

  .empty-gallery {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text2); text-align: center;
  }
  .empty-gallery svg { margin-bottom: 12px; opacity: 0.3; }
  .empty-gallery p { font-size: 14px; line-height: 1.6; }

  .detail-view {
    position: fixed; inset: 0; z-index: 100;
    background: #000; display: none;
    flex-direction: column; overflow: hidden;
  }
  .detail-view.show { display: flex; }

  .detail-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; background: rgba(0,0,0,0.5);
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
  }
  .detail-counter { font-size: 13px; color: var(--text2); }
  .detail-close { background: none; border: none; color: #fff;
    font-size: 24px; cursor: pointer; padding: 0; width: 32px; height: 32px;
  }

  .detail-content {
    flex: 1; display: flex; overflow: hidden;
    position: relative;
  }
  .detail-media {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-media img, .detail-media video {
    max-width: 100%; max-height: 100%;
    display: block;
  }

  .detail-controls {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px; background: rgba(0,0,0,0.5);
    border-top: 0.5px solid rgba(255,255,255,0.1);
  }
  .detail-btn {
    background: none; border: none; color: #fff;
    font-size: 28px; cursor: pointer; padding: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .detail-center-controls {
    display: flex; gap: 16px; align-items: center;
  }

  .gallery-grid::-webkit-scrollbar { width: 4px; }
  .gallery-grid::-webkit-scrollbar-track { background: transparent; }
  .gallery-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 0.5px solid var(--border2);
    color: var(--text); padding: 10px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .progress-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center;
  }
  .progress-overlay.show { display: flex; }
  .progress-box {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 16px; padding: 24px 28px; width: 78%; max-width: 320px;
    text-align: center;
  }
  .progress-label {
    font-size: 13px; color: var(--text2); margin-bottom: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .progress-track { height: 8px; background: var(--border2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: width 0.2s ease; }
  .progress-pct { margin-top: 12px; font-size: 24px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }

  #fileInput { display: none; }

  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🖼 PhotoPlayer</h1>
  <div class="header-actions">
    <button class="btn btn-accent" id="addBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      追加
    </button>
    <button class="btn btn-danger" id="clearBtn">全削除</button>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime,video/x-m4v,video/webm" multiple>
  </div>
</div>

<div class="main">
  <div class="gallery-grid" id="galleryGrid">
    <div class="empty-gallery" id="emptyGallery">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>写真・動画を追加してください<br>複数選択に対応しています</p>
    </div>
  </div>
</div>

<div class="detail-view" id="detailView">
  <div class="detail-header">
    <span class="detail-counter" id="detailCounter"></span>
    <button class="detail-close" id="detailClose">✕</button>
  </div>
  <div class="detail-content">
    <div class="detail-media" id="detailMedia"></div>
  </div>
  <div class="detail-controls">
    <button class="detail-btn" id="detailPrevBtn">‹</button>
    <div class="detail-center-controls">
      <button class="detail-btn" id="detailPlayBtn" style="font-size:32px">▶</button>
      <button class="detail-btn" id="detailSlideBtn" title="スライドショー">▶▶</button>
    </div>
    <button class="detail-btn" id="detailNextBtn">›</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-label" id="progressLabel">追加中…</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>
</div>

<div id="ver" style="position:fixed;bottom:4px;right:8px;font-size:12px;color:#888;z-index:999;pointer-events:none;font-family:monospace;"></div>

<script>
const DB_NAME = 'photoPlayerDB1', STORE = 'media', DB_VER = 1;
const THUMB_W = 200, THUMB_H = 200, THUMB_Q = 0.85;
let db, media = [], currentDetailIdx = -1, isSlideShowRunning = false, slideShowTimer = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej('DB error');
  });
}

function getAllMedia() {
  return new Promise(res => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => {
      const list = req.result || [];
      list.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
      res(list);
    };
  });
}

function generateThumb(file) {
  return new Promise(res => {
    const type = file.type;
    if (type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = THUMB_W; c.height = THUMB_H;
          const ctx = c.getContext('2d');
          ctx.imageSmoothingQuality = 'high';
          const iw = img.width, ih = img.height, targetAR = THUMB_W / THUMB_H, srcAR = iw / ih;
          let sw, sh, sx, sy;
          if (srcAR > targetAR) { sh = ih; sw = ih * targetAR; sx = (iw - sw) / 2; sy = 0; }
          else { sw = iw; sh = iw / targetAR; sx = 0; sy = (ih - sh) / 2; }
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, THUMB_W, THUMB_H);
          res(c.toDataURL('image/jpeg', THUMB_Q));
        };
        img.onerror = () => res(null);
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    } else if (type.startsWith('video/')) {
      const v = document.createElement('video');
      v.muted = true; v.style.cssText = 'position:fixed;left:-9999px;top:0;width:120px;height:68px;opacity:0;';
      document.body.appendChild(v);
      const url = URL.createObjectURL(file);
      v.src = url;
      let settled = false;
      const timer = setTimeout(() => { if (!settled && v.videoWidth) draw(); else finish(null); }, 12000);
      function finish(result) {
        if (settled) return; settled = true; clearTimeout(timer);
        try { v.pause(); URL.revokeObjectURL(url); v.removeAttribute('src'); if (v.parentNode) v.parentNode.removeChild(v); } catch (e) {}
        res(result);
      }
      function draw() {
        try {
          const c = document.createElement('canvas');
          c.width = THUMB_W; c.height = THUMB_H;
          const ctx = c.getContext('2d'), vw = v.videoWidth, vh = v.videoHeight;
          if (vw && vh) {
            const targetAR = THUMB_W / THUMB_H, srcAR = vw / vh;
            let sw, sh, sx, sy;
            if (srcAR > targetAR) { sh = vh; sw = vh * targetAR; sx = (vw - sw) / 2; sy = 0; }
            else { sw = vw; sh = vw / targetAR; sx = 0; sy = (vh - sh) / 2; }
            ctx.drawImage(v, sx, sy, sw, sh, 0, 0, THUMB_W, THUMB_H);
          } else ctx.drawImage(v, 0, 0, THUMB_W, THUMB_H);
          finish(c.toDataURL('image/jpeg', THUMB_Q));
        } catch (e) { finish(null); }
      }
      v.addEventListener('loadeddata', async () => {
        const d = v.duration, target = (isFinite(d) && d > 0) ? Math.min(3, d * 0.1) : 0.1;
        try { await v.play(); } catch (e) {}
        let grabbed = false;
        const grab = () => { if (grabbed) return; grabbed = true; try { v.pause(); } catch (e) {} requestAnimationFrame(() => requestAnimationFrame(draw)); };
        v.addEventListener('seeked', grab, { once: true });
        v.addEventListener('timeupdate', () => { if (v.currentTime > 0.05) grab(); }, { once: true });
        try { v.currentTime = target; } catch (e) { grab(); }
      });
      v.addEventListener('error', () => finish(null));
    } else res(null);
  });
}

async function addMedia(file) {
  const thumb = await generateThumb(file);
  const type = file.type.startsWith('video/') ? 'video' : 'image';
  let duration = null;

  if (type === 'video') {
    const url = URL.createObjectURL(file);
    duration = await new Promise(res => {
      const v = document.createElement('video');
      v.src = url;
      const timer = setTimeout(() => {
        try { v.pause(); v.src = ''; } catch (e) {}
        URL.revokeObjectURL(url);
        res(null);
      }, 3000);
      v.addEventListener('loadedmetadata', () => {
        clearTimeout(timer);
        const dur = v.duration;
        try { v.pause(); v.src = ''; } catch (e) {}
        URL.revokeObjectURL(url);
        res(dur);
      }, { once: true });
      v.addEventListener('error', () => {
        clearTimeout(timer);
        URL.revokeObjectURL(url);
        res(null);
      }, { once: true });
    });
  }

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => resolve(false);
    const req = tx.objectStore(STORE).add({ name: file.name, blob: file, thumb, type, duration, addedAt: Date.now() });
    req.onerror = () => { tx.abort(); };
  });
}

function updateGallery() {
  const grid = document.getElementById('galleryGrid');
  const empty = document.getElementById('emptyGallery');
  if (media.length === 0) {
    grid.innerHTML = '';
    grid.appendChild(empty.cloneNode(true));
    return;
  }
  grid.innerHTML = '';
  media.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    const thumb = item.thumb || (item.type === 'image' ? '📷' : '🎬');
    let html = typeof thumb === 'string' && thumb.startsWith('data:') ? `<img src="${thumb}" alt="">` : `<img src="${thumb}" alt="">`;
    if (item.type === 'video') html += item.duration ? `<div class="duration">${Math.floor(item.duration / 60)}:${Math.floor(item.duration % 60).toString().padStart(2, '0')}</div>` : '' + '<div class="play-badge">▶</div>';
    div.innerHTML = html;
    div.addEventListener('click', () => showDetail(idx));
    grid.appendChild(div);
  });
}

let swipeStartX = 0, swipeStartY = 0;

function setupSwipeHandler() {
  const detail = document.getElementById('detailView');
  detail.addEventListener('touchstart', handleSwipeStart, { passive: true });
  detail.addEventListener('touchend', handleSwipeEnd, { passive: true });
}

function handleSwipeStart(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}

function handleSwipeEnd(e) {
  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;
  const diffX = touchEndX - swipeStartX;
  const diffY = touchEndY - swipeStartY;
  const minSwipeDistance = 50;

  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > minSwipeDistance) {
    if (diffX > 0) goDetailPrev();
    else goDetailNext();
  }
}

function showDetail(idx) {
  currentDetailIdx = idx;
  const detail = document.getElementById('detailView');
  detail.classList.add('show');
  renderDetailMedia();
  updateDetailCounter();
}

function renderDetailMedia() {
  const item = media[currentDetailIdx];
  const media_el = document.getElementById('detailMedia');
  media_el.innerHTML = '';
  if (!item) return;
  const url = URL.createObjectURL(item.blob);
  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = url;
    media_el.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.playsinline = true;
    media_el.appendChild(video);
  }
}

function updateDetailCounter() {
  document.getElementById('detailCounter').textContent = `${currentDetailIdx + 1} / ${media.length}`;
}

function closeDetail() {
  const detail = document.getElementById('detailView');
  detail.classList.remove('show');
  if (isSlideShowRunning) { isSlideShowRunning = false; if (slideShowTimer) clearInterval(slideShowTimer); }
}

function goDetailNext() {
  currentDetailIdx = (currentDetailIdx + 1) % media.length;
  renderDetailMedia();
  updateDetailCounter();
}

function goDetailPrev() {
  currentDetailIdx = (currentDetailIdx - 1 + media.length) % media.length;
  renderDetailMedia();
  updateDetailCounter();
}

function toggleSlideShow() {
  if (isSlideShowRunning) {
    isSlideShowRunning = false;
    if (slideShowTimer) clearInterval(slideShowTimer);
    document.getElementById('detailSlideBtn').textContent = '▶▶';
  } else {
    isSlideShowRunning = true;
    slideShowTimer = setInterval(goDetailNext, 3000);
    document.getElementById('detailSlideBtn').textContent = '⏸';
  }
}

async function handleFileSelect(files) {
  const overlay = document.getElementById('progressOverlay');
  overlay.classList.add('show');
  const label = document.getElementById('progressLabel');
  const fill = document.getElementById('progressFill');
  const pct = document.getElementById('progressPct');

  let added = 0;
  for (let i = 0; i < files.length; i++) {
    label.textContent = files[i].name;
    fill.style.width = ((i / files.length) * 100) + '%';
    pct.textContent = Math.floor((i / files.length) * 100) + '%';
    const id = await addMedia(files[i]);
    if (id) added++;
  }

  fill.style.width = '100%';
  pct.textContent = '100%';
  setTimeout(() => {
    overlay.classList.remove('show');
    getAllMedia().then(list => {
      media = list;
      updateGallery();
      if (added > 0) {
        const el = document.getElementById('toast');
        el.textContent = `${added}件追加しました`;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
      }
    });
  }, 500);
}

// 初期化
async function init() {
  // バージョン表示
  const buildMeta = document.querySelector('meta[name="build"]');
  if (buildMeta?.content) document.getElementById('ver').textContent = buildMeta.content;

  // イベントリスナー
  document.getElementById('addBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      handleFileSelect(e.target.files);
      e.target.value = '';
    }
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('すべて削除しますか？')) return;
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = () => {
      media = [];
      updateGallery();
      const el = document.getElementById('toast');
      el.textContent = 'すべて削除しました';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    };
  });
  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('detailPrevBtn').addEventListener('click', goDetailPrev);
  document.getElementById('detailNextBtn').addEventListener('click', goDetailNext);
  document.getElementById('detailPlayBtn').addEventListener('click', () => {
    const video = document.querySelector('#detailMedia video');
    if (video) video.paused ? video.play() : video.pause();
  });
  document.getElementById('detailSlideBtn').addEventListener('click', toggleSlideShow);
  document.getElementById('detailView').addEventListener('click', (e) => {
    if (e.target.id === 'detailView') closeDetail();
  });

  // スワイプハンドラ設定
  setupSwipeHandler();

  // DB初期化とメディア読み込み
  await openDB();
  const list = await getAllMedia();
  media = list;
  updateGallery();
}

// スクリプトは HTML 最後に配置されているので、DOM は完全に読み込まれている
init().catch(e => console.error('Init error:', e));
</script>
</body>
</html>
